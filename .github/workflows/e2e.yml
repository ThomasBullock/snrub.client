name: E2E Tests

on:
  pull_request:
    branches: [main]

env:
  # Shared DB config for API migrations, seeds, and server
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  POSTGRES_DB: test_db
  JWT_SECRET: test-jwt-secret-for-ci
  JWT_ALGORITHM: HS256
  JWT_EXPIRES_MINUTES: 60
  GOOGLE_CLIENT_ID: placeholder-client-id
  GOOGLE_CLIENT_SECRET: placeholder-client-secret
  GOOGLE_AUTH_REDIRECT_URI: http://localhost:8000/api/auth/google/callback
  MAIL_USERNAME: test
  MAIL_PASSWORD: test
  MAIL_FROM: test@example.com
  MAIL_PORT: 1025
  MAIL_SERVER: mailhog
  MAIL_STARTTLS: False
  MAIL_SSL_TLS: False
  MAIL_SUPPRESS_SEND: True
  # APP_ENV=development so the seed runner populates test users.
  # Pragmatic shortcut — the seed guard only allows "development".
  # TODO: update API seed_runner.py to also allow APP_ENV=test, then switch this.
  APP_ENV: development

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # --- Client setup ---
      - name: Checkout client
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # --- API setup ---
      - name: Checkout API
        uses: actions/checkout@v4
        with:
          repository: ThomasBullock/snrub.api
          path: snrub.api

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install API dependencies
        run: uv sync --frozen
        working-directory: snrub.api

      - name: Run migrations
        run: uv run alembic upgrade head
        working-directory: snrub.api

      - name: Seed database
        run: uv run python -m seeds.seed_runner
        working-directory: snrub.api

      - name: Start API server
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl --fail --silent http://localhost:8000/docs > /dev/null || (echo "API failed to start" && exit 1)
        working-directory: snrub.api

      # --- Run E2E tests ---
      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        env:
          CI: true
          VITE_API_URL: http://localhost:8000/api
          E2E_TEST_USER_EMAIL: w.smithers@snrub-corp.io
          E2E_TEST_USER_PASSWORD: P@ssw0rd!

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
